name: Test basic pytest coverage text file
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          pytest-coverage-path: tests/fixtures/pytest-coverage.txt
          hide-comment: 'true'
          title: 'Test Coverage Report'
          badge-title: 'Coverage'

      - name: Assert coverage output is set
        env:
          COVERAGE: ${{ steps.action.outputs.coverage }}
        run: |
          echo "coverage: $COVERAGE"
          if [ -z "$COVERAGE" ]; then
            echo "FAIL: coverage output is empty"
            exit 1
          fi
          echo "PASS: coverage output is '$COVERAGE'"

      - name: Assert color output is set
        env:
          COLOR: ${{ steps.action.outputs.color }}
        run: |
          echo "color: $COLOR"
          if [ -z "$COLOR" ]; then
            echo "FAIL: color output is empty"
            exit 1
          fi
          echo "PASS: color output is '$COLOR'"

      - name: Assert coverageHtml output is set
        env:
          HTML: ${{ steps.action.outputs.coverageHtml }}
        run: |
          echo "coverageHtml length: ${#HTML}"
          if [ -z "$HTML" ]; then
            echo "FAIL: coverageHtml output is empty"
            exit 1
          fi
          echo "PASS: coverageHtml is non-empty"

      - name: Assert coverage percentage is 85%
        env:
          COVERAGE: ${{ steps.action.outputs.coverage }}
        run: |
          echo "coverage: $COVERAGE"
          if [ "$COVERAGE" != "85%" ]; then
            echo "FAIL: expected '85%' but got '$COVERAGE'"
            exit 1
          fi
          echo "PASS"
