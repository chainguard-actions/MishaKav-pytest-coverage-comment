name: Test XML coverage report parsing
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create XML coverage file
        run: |
          cat > /tmp/coverage.xml << 'EOF'
          <?xml version="1.0" ?>
          <coverage version="6.3.2" timestamp="1648000000" lines-valid="80" lines-covered="68" line-rate="0.85" branches-covered="0" branches-valid="0" branch-rate="0" complexity="0">
            <packages>
              <package name="src" line-rate="0.85" branch-rate="0" complexity="0">
                <classes>
                  <class name="main.py" filename="src/main.py" complexity="0" line-rate="0.80" branch-rate="0">
                    <lines>
                      <line number="1" hits="1"/>
                      <line number="2" hits="1"/>
                      <line number="20" hits="0"/>
                    </lines>
                  </class>
                  <class name="utils.py" filename="src/utils.py" complexity="0" line-rate="1.0" branch-rate="0">
                    <lines>
                      <line number="1" hits="1"/>
                      <line number="2" hits="1"/>
                    </lines>
                  </class>
                </classes>
              </package>
            </packages>
          </coverage>
          EOF

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          pytest-xml-coverage-path: /tmp/coverage.xml
          hide-comment: 'true'

      - name: Assert coverage output is set
        env:
          COVERAGE: ${{ steps.action.outputs.coverage }}
        run: |
          echo "coverage: $COVERAGE"
          if [ -z "$COVERAGE" ]; then
            echo "FAIL: expected coverage output to be non-empty"
            exit 1
          fi
          echo "PASS: coverage=$COVERAGE"

      - name: Assert color output is set
        env:
          COLOR: ${{ steps.action.outputs.color }}
        run: |
          echo "color: $COLOR"
          if [ -z "$COLOR" ]; then
            echo "FAIL: expected color output to be non-empty"
            exit 1
          fi
          echo "PASS: color=$COLOR"
