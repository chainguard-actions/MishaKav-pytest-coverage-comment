name: Test XML coverage report input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create XML coverage file
        run: |
          cat > /tmp/coverage.xml << 'EOF'
          <?xml version="1.0" ?>
          <coverage version="6.4.4" timestamp="1661000000" lines-valid="100" lines-covered="85" line-rate="0.85" branches-covered="0" branches-valid="0" branch-rate="0" complexity="0">
            <packages>
              <package name="src" line-rate="0.85" branch-rate="0" complexity="0">
                <classes>
                  <class name="app.py" filename="src/app.py" complexity="0" line-rate="0.9" branch-rate="0">
                    <lines>
                      <line number="1" hits="1"/>
                      <line number="2" hits="1"/>
                      <line number="10" hits="0"/>
                    </lines>
                  </class>
                  <class name="utils.py" filename="src/utils.py" complexity="0" line-rate="0.8" branch-rate="0">
                    <lines>
                      <line number="1" hits="1"/>
                      <line number="5" hits="0"/>
                    </lines>
                  </class>
                </classes>
              </package>
            </packages>
          </coverage>
          EOF

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          pytest-xml-coverage-path: /tmp/coverage.xml
          hide-comment: 'true'

      - name: Assert coverage output is set
        env:
          ACTUAL: ${{ steps.action.outputs.coverage }}
        run: |
          echo "actual coverage: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected coverage output to be non-empty"
            exit 1
          fi
          echo "PASS: coverage=$ACTUAL"

      - name: Assert color output is set
        env:
          ACTUAL: ${{ steps.action.outputs.color }}
        run: |
          echo "actual color: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected color output to be non-empty"
            exit 1
          fi
          echo "PASS: color=$ACTUAL"
