name: Test JUnit XML test statistics parsing
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create pytest coverage text file
        run: |
          cat > /tmp/pytest-coverage.txt << 'EOF'
          ---------- coverage: platform linux, python 3.9.7-final-0 ----------
          Name                 Stmts   Miss  Cover   Missing
          ----------------------------------------------------
          src/main.py             50     10    80%   20-25, 40-44
          ----------------------------------------------------
          TOTAL                   50     10    80%

          10 passed, 2 skipped, 1 failed in 1.23s
          EOF

      - name: Create JUnit XML file
        run: |
          cat > /tmp/junit.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <testsuites>
            <testsuite name="pytest" errors="0" failures="1" skipped="2" tests="10" time="1.234">
              <testcase classname="tests.test_main" name="test_success" time="0.1"/>
              <testcase classname="tests.test_main" name="test_skip" time="0.0">
                <skipped message="skipped"/>
              </testcase>
              <testcase classname="tests.test_main" name="test_fail" time="0.5">
                <failure message="AssertionError">assert False</failure>
              </testcase>
            </testsuite>
          </testsuites>
          EOF

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          pytest-coverage-path: /tmp/pytest-coverage.txt
          junitxml-path: /tmp/junit.xml
          junitxml-title: 'Test Results'
          hide-comment: 'true'

      - name: Assert tests output is set
        env:
          TESTS: ${{ steps.action.outputs.tests }}
        run: |
          echo "tests: $TESTS"
          if [ -z "$TESTS" ]; then
            echo "FAIL: expected tests output to be non-empty"
            exit 1
          fi
          echo "PASS: tests=$TESTS"

      - name: Assert failures output is set
        env:
          FAILURES: ${{ steps.action.outputs.failures }}
        run: |
          echo "failures: $FAILURES"
          if [ -z "$FAILURES" ]; then
            echo "FAIL: expected failures output to be non-empty"
            exit 1
          fi
          echo "PASS: failures=$FAILURES"

      - name: Assert skipped output is set
        env:
          SKIPPED: ${{ steps.action.outputs.skipped }}
        run: |
          echo "skipped: $SKIPPED"
          if [ -z "$SKIPPED" ]; then
            echo "FAIL: expected skipped output to be non-empty"
            exit 1
          fi
          echo "PASS: skipped=$SKIPPED"

      - name: Assert time output is set
        env:
          TIME: ${{ steps.action.outputs.time }}
        run: |
          echo "time: $TIME"
          if [ -z "$TIME" ]; then
            echo "FAIL: expected time output to be non-empty"
            exit 1
          fi
          echo "PASS: time=$TIME"

      - name: Assert summaryReport output is set
        env:
          SUMMARY: ${{ steps.action.outputs.summaryReport }}
        run: |
          echo "summaryReport length: ${#SUMMARY}"
          if [ -z "$SUMMARY" ]; then
            echo "FAIL: expected summaryReport output to be non-empty"
            exit 1
          fi
          echo "PASS"
