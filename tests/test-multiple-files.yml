name: Test multiple-files input for monorepo
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          hide-comment: 'true'
          multiple-files: |
            Backend, tests/fixtures/pytest-coverage.txt
            Frontend, tests/fixtures/coverage.xml

      - name: Assert coverageHtml output is set for multiple files
        env:
          HTML: ${{ steps.action.outputs.coverageHtml }}
        run: |
          echo "coverageHtml length: ${#HTML}"
          if [ -z "$HTML" ]; then
            echo "FAIL: expected coverageHtml output to be non-empty for multiple-files input"
            exit 1
          fi
          echo "PASS: coverageHtml is set"
