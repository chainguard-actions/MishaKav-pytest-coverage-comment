name: Test multiple-files input for monorepo coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create backend coverage text file
        run: |
          cat > /tmp/backend-coverage.txt << 'EOF'
          ---------- coverage: platform linux, python 3.9.7-final-0 ----------
          Name                      Stmts   Miss  Cover   Missing
          ---------------------------------------------------------
          backend/api.py               60     12    80%   10-15, 50-56
          backend/models.py            40      0   100%
          ---------------------------------------------------------
          TOTAL                       100     12    88%

          15 passed in 0.80s
          EOF

      - name: Create frontend coverage text file
        run: |
          cat > /tmp/frontend-coverage.txt << 'EOF'
          ---------- coverage: platform linux, python 3.9.7-final-0 ----------
          Name                       Stmts   Miss  Cover   Missing
          ----------------------------------------------------------
          frontend/views.py             30      6    80%   20-25
          frontend/forms.py             20      2    90%   15-16
          ----------------------------------------------------------
          TOTAL                         50      8    84%

          10 passed in 0.45s
          EOF

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          hide-comment: 'true'
          multiple-files: |
            Backend API, /tmp/backend-coverage.txt
            Frontend Tests, /tmp/frontend-coverage.txt

      - name: Assert coverageHtml output is set
        env:
          HTML: ${{ steps.action.outputs.coverageHtml }}
        run: |
          echo "coverageHtml length: ${#HTML}"
          if [ -z "$HTML" ]; then
            echo "FAIL: expected coverageHtml output to be non-empty"
            exit 1
          fi
          echo "PASS"
