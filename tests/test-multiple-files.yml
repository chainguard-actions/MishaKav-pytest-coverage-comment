name: Test multiple coverage files input
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          hide-comment: 'true'
          multiple-files: |
            Backend, tests/fixtures/pytest-coverage.txt, tests/fixtures/junit.xml
            Frontend, tests/fixtures/pytest-coverage.txt,

      - name: Assert action completed without error
        run: |
          echo "Action completed successfully with multiple-files input"
          echo "PASS"

      - name: Assert coverage output is set from multiple files
        env:
          COVERAGE: ${{ steps.action.outputs.coverage }}
        run: |
          echo "coverage: $COVERAGE"
          # With multiple-files, coverage output may be empty or set depending on implementation
          # The action should at least not fail
          echo "PASS: action ran successfully, coverage='$COVERAGE'"
