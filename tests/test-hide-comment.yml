name: Test hide-comment mode with outputs only
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create pytest coverage txt file
        run: |
          cat > /tmp/pytest-coverage.txt << 'EOF'
          ----------- coverage: platform linux, python 3.9.7-final-0 -----------
          Name                 Stmts   Miss  Cover   Missing
          ----------------------------------------------------
          src/app.py              50     10    80%   20-29
          src/models.py           30      0   100%
          ----------------------------------------------------
          TOTAL                   80     10    88%

          ==================== 10 passed, 2 skipped in 0.55s ====================
          EOF

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          pytest-coverage-path: /tmp/pytest-coverage.txt
          hide-comment: 'true'
          hide-badge: 'true'
          title: 'My Coverage Report'

      - name: Assert coverage output is non-empty
        env:
          ACTUAL: ${{ steps.action.outputs.coverage }}
        run: |
          echo "actual coverage: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected coverage output to be non-empty"
            exit 1
          fi
          echo "PASS: coverage=$ACTUAL"

      - name: Assert coverageHtml output is non-empty
        env:
          ACTUAL: ${{ steps.action.outputs.coverageHtml }}
        run: |
          echo "actual coverageHtml length: ${#ACTUAL}"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected coverageHtml output to be non-empty"
            exit 1
          fi
          echo "PASS"
