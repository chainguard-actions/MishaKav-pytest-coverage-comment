name: Test hide-badge and hide-report options
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          pytest-coverage-path: tests/fixtures/pytest-coverage.txt
          hide-comment: 'true'
          hide-badge: 'true'
          hide-report: 'true'
          hide-emoji: 'true'

      - name: Assert coverage output is still set when badge and report are hidden
        env:
          COVERAGE: ${{ steps.action.outputs.coverage }}
        run: |
          echo "coverage: $COVERAGE"
          if [ -z "$COVERAGE" ]; then
            echo "FAIL: expected coverage output to be non-empty even when badge/report hidden"
            exit 1
          fi
          echo "PASS: coverage=$COVERAGE"

      - name: Assert color output is still set when badge and report are hidden
        env:
          COLOR: ${{ steps.action.outputs.color }}
        run: |
          echo "color: $COLOR"
          if [ -z "$COLOR" ]; then
            echo "FAIL: expected color output to be non-empty even when badge/report hidden"
            exit 1
          fi
          echo "PASS: color=$COLOR"
